version: 2
updates:
- package-ecosystem: pip
  directory: "/"
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  open-pull-requests-limit: 10
- package-ecosystem: github-actions
  directory: "/"
  groups:
    github-actions:
      patterns:
        - "*"  # Group all Actions updates into a single larger pull request
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
- package-ecosystem: docker
  directory: "/"
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
